<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>grouplock</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    @keyframes fade-up {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-4px); }
    }
    @keyframes pulse-dot {
      0%, 100% { opacity: 0.55; transform: scale(1); }
      50%       { opacity: 1;    transform: scale(1.3); }
    }
    @keyframes blink-eyes {
      0%, 92%, 100% { transform: scaleY(1); }
      96%            { transform: scaleY(0.08); }
    }

    :root {
      --bg:      #0a0a0a;
      --card:    #111111;
      --border:  #262626;
      --fg:      #fafafa;
      --muted:   #737373;
      --muted2:  #404040;
    }

    body {
      width: 300px;
      min-height: 200px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--fg);
      padding: 16px 18px 18px;
      overflow: hidden;
    }

    /* Subtle grid texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, rgba(250,250,250,0.035) 1px, transparent 1px);
      background-size: 20px 20px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      animation: fade-up 0.45s cubic-bezier(0.22,1,0.36,1) both;
      position: relative;
      z-index: 1;
    }

    .logo-wrap {
      display: flex;
      align-items: center;
      gap: 7px;
    }

    /* Glyph mascot SVG — inline, animated */
    .glyph {
      animation: float 6s ease-in-out infinite;
      flex-shrink: 0;
    }
    .glyph-eyes {
      animation: blink-eyes 5s 2s ease-in-out infinite;
      transform-origin: center;
    }

    .logo-text {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: -0.3px;
      color: var(--fg);
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .status-dot.active   { background: var(--fg); animation: pulse-dot 2.5s ease-in-out infinite; }
    .status-dot.inactive { background: var(--muted2); }

    /* ── Divider ── */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 12px 0;
      position: relative;
      z-index: 1;
    }

    /* ── Sections ── */
    .section {
      margin-bottom: 12px;
      animation: fade-up 0.5s cubic-bezier(0.22,1,0.36,1) both;
      position: relative;
      z-index: 1;
    }
    .section:nth-child(2) { animation-delay: 50ms;  }
    .section:nth-child(3) { animation-delay: 100ms; }
    .section:nth-child(4) { animation-delay: 150ms; }

    .label {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--muted);
      font-weight: 600;
      margin-bottom: 5px;
      font-family: 'SF Mono', 'Fira Code', 'Menlo', monospace;
    }

    /* Focus state pill */
    .focus-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px 4px 7px;
      border-radius: 3px;
      font-size: 12px;
      font-weight: 600;
      border: 1px solid var(--border);
      background: var(--card);
    }
    .focus-pill .pill-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
    }
    /* States use grayscale tints aligned with monochrome scheme */
    .focus-pill.on-task        { border-color: rgba(250,250,250,0.25); }
    .focus-pill.on-task .pill-dot  { background: var(--fg); animation: pulse-dot 2.5s ease-in-out infinite; }
    .focus-pill.warning        { border-color: rgba(250,250,250,0.15); color: #a3a3a3; }
    .focus-pill.warning .pill-dot  { background: #737373; animation: pulse-dot 2s ease-in-out infinite; }
    .focus-pill.locked         { border-color: rgba(250,250,250,0.1); color: #737373; }
    .focus-pill.locked .pill-dot   { background: #525252; }
    .focus-pill.approved-break { border-color: rgba(250,250,250,0.1); color: #a3a3a3; }
    .focus-pill.approved-break .pill-dot { background: #737373; animation: pulse-dot 3s ease-in-out infinite; }

    /* Domain row */
    .domain-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .domain-name {
      font-size: 12px;
      font-weight: 500;
      color: var(--fg);
      font-family: 'SF Mono', 'Fira Code', 'Menlo', monospace;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 190px;
    }
    .domain-badge {
      font-size: 9px;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 3px;
      border: 1px solid var(--border);
      font-family: 'SF Mono', 'Fira Code', 'Menlo', monospace;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      flex-shrink: 0;
    }
    .domain-badge.allowed  { color: var(--fg);   border-color: rgba(250,250,250,0.3); }
    .domain-badge.blocked  { color: var(--muted); border-color: var(--border); }
    .domain-badge.unlisted { color: var(--muted); border-color: var(--border); }

    /* CTA */
    .cta {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      width: 100%;
      padding: 8px 14px;
      background: var(--fg);
      color: var(--bg);
      border: none;
      border-radius: 3px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: opacity 0.2s, transform 0.2s;
      animation: fade-up 0.55s 180ms cubic-bezier(0.22,1,0.36,1) both;
      margin-top: 4px;
      position: relative;
      z-index: 1;
    }
    .cta:hover { opacity: 0.88; transform: translateY(-1px); }

    /* Inactive state */
    .inactive-msg {
      text-align: center;
      padding: 24px 0 16px;
      animation: fade-up 0.5s ease both;
      position: relative;
      z-index: 1;
    }
    .inactive-glyph {
      display: flex;
      justify-content: center;
      margin-bottom: 14px;
      opacity: 0.4;
    }
    .inactive-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--fg);
      margin-bottom: 5px;
    }
    .inactive-sub {
      font-size: 11px;
      color: var(--muted);
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo-wrap">
      <!-- Glyph mascot SVG (inline) -->
      <svg class="glyph" width="20" height="24" viewBox="0 0 36 44" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="grouplock">
        <!-- Shackle -->
        <path d="M11.5 19V13.5a6.5 6.5 0 0113 0V19" stroke="#fafafa" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        <!-- Lock body -->
        <rect x="4" y="19" width="28" height="21" rx="3" fill="#fafafa"/>
        <!-- Eyes (cutout) -->
        <g class="glyph-eyes">
          <rect x="8.5" y="24.5" width="5.5" height="3.8" rx="0.8" fill="#0a0a0a"/>
          <rect x="22" y="24.5" width="5.5" height="3.8" rx="0.8" fill="#0a0a0a"/>
        </g>
        <!-- Keyhole -->
        <circle cx="18" cy="34.5" r="2.4" fill="#0a0a0a"/>
        <rect x="16.7" y="33" width="2.6" height="4" rx="0" fill="#0a0a0a"/>
      </svg>
      <span class="logo-text">grouplock</span>
    </div>
    <span class="status-dot" id="statusDot"></span>
  </div>

  <div id="content"></div>
  <script src="popup.js"></script>
</body>
</html>
