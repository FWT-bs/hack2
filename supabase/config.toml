# Local Supabase / CLI — mirrors a typical project layout (see Impostor for a fuller example).
# https://supabase.com/docs/guides/cli/config

project_id = "hack2"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
health_timeout = "2m"
major_version = 15

[db.migrations]
enabled = true
schema_paths = []

[db.seed]
enabled = false

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[realtime]
enabled = true

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://127.0.0.1:3000"
